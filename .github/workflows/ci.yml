name: CI

on:
  push:
    branches: [main, develop, 'claude/**', 'feat/**', 'fix/**']
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint · Typecheck · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: ESLint
        run: npm run lint

      - name: TypeScript check
        run: npm run type-check

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Tests
        run: npm run test --if-present

      - name: Build
        run: npm run build
        env:
          # Variables publiques — valeurs fictives pour le build CI (pas de secrets)
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          NEXT_PUBLIC_APP_URL: https://daada-web.vercel.app
          # JWT / Redis — placeholders (build only, pas de vrai traffic)
          JWT_SECRET: ci-placeholder-secret-32chars-minimum
          JWT_REFRESH_SECRET: ci-placeholder-refresh-secret-32ch
          UPSTASH_REDIS_REST_URL: https://placeholder.upstash.io
          UPSTASH_REDIS_REST_TOKEN: placeholder-token
