<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Hors ligne — Daada Fast Food</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
      background: #0A0A0A;
      color: #F5F5F5;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      padding: 2rem 1rem env(safe-area-inset-bottom);
      text-align: center;
    }

    .flame {
      width: 72px;
      height: 72px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #FF6B00;
    }

    p {
      font-size: 0.9rem;
      color: #8A8A8A;
      max-width: 280px;
      line-height: 1.6;
    }

    button {
      margin-top: 0.5rem;
      padding: 0.75rem 2rem;
      background: #FF6B00;
      color: #fff;
      border: none;
      border-radius: 9999px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #CC5500; }
  </style>
</head>
<body>
  <!-- Daada flame icon (inline SVG) -->
  <svg class="flame" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <path d="M36 6C36 6 48 20 48 32C48 39.732 42.627 46 36 46C29.373 46 24 39.732 24 32C24 20 36 6 36 6Z"
          fill="#FF6B00" opacity="0.9"/>
    <path d="M36 22C36 22 42 30 42 36C42 39.314 39.314 42 36 42C32.686 42 30 39.314 30 36C30 30 36 22 36 22Z"
          fill="#FF8C38"/>
    <path d="M36 32C36 32 38 35 38 37C38 38.105 37.105 39 36 39C34.895 39 34 38.105 34 37C34 35 36 32 36 32Z"
          fill="#FFF8F3"/>
    <rect x="28" y="56" width="16" height="4" rx="2" fill="#2A2A2A"/>
    <rect x="22" y="60" width="28" height="4" rx="2" fill="#2A2A2A"/>
  </svg>

  <h1>Vous êtes hors ligne</h1>
  <p>Vérifiez votre connexion internet et réessayez. Vos commandes seront envoyées automatiquement lorsque la connexion sera rétablie.</p>
  <button onclick="window.location.reload()">Réessayer</button>
</body>
</html>
